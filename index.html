<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR 코드 생성기 - WiFi·vCard·로고까지 한 번에 | CODINGNOW</title>
<meta name="description" content="텍스트·URL·WiFi·vCard를 QR로 즉시 변환. 로고 삽입, 색상 커스터마이즈, PNG·SVG 다운로드. 무료, 설치 불필요.">
<meta property="og:title" content="QR 코드 생성기 — WiFi·vCard·로고 | CODINGNOW">
<meta property="og:description" content="텍스트·URL·WiFi·vCard QR 생성. 중앙 로고 삽입과 색상 커스터마이즈. 무료.">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Gowun+Dodum&display=swap" rel="stylesheet">
<!-- QR 엔진: 격자(모듈) 데이터를 계산 → PNG(canvas)와 SVG 양쪽에 사용 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>
<style>
  :root{
    --bg:#0b0a08; --panel:#141210; --panel-2:#1c1916;
    --amber:#ffb000; --amber-dim:#b8801f; --amber-glow:rgba(255,176,0,.35);
    --green:#5ddc7a; --red:#e0876a; --line:#2a251e; --muted:#7a6f5c; --text:#f3e7cf;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:radial-gradient(ellipse 120% 80% at 50% -10%, rgba(255,176,0,.06), transparent 60%), var(--bg);
    color:var(--text); font-family:'JetBrains Mono',monospace;
    min-height:100vh; display:flex; align-items:flex-start; justify-content:center;
    padding:clamp(16px,4vw,40px); position:relative; overflow-x:hidden;
  }
  body::after{content:"";position:fixed;inset:0;pointer-events:none;background:repeating-linear-gradient(to bottom,rgba(0,0,0,0) 0px,rgba(0,0,0,0) 2px,rgba(0,0,0,.18) 3px,rgba(0,0,0,0) 4px);mix-blend-mode:multiply;z-index:99}

  .wrap{width:100%;max-width:820px;position:relative;z-index:1}
  header{margin-bottom:24px}
  .badge{display:inline-block;font-size:11px;letter-spacing:.18em;color:var(--amber-dim);border:1px solid var(--line);padding:4px 10px;border-radius:2px;margin-bottom:14px;text-transform:uppercase}
  h1{font-size:clamp(24px,5.5vw,36px);font-weight:800;line-height:1.05;color:var(--amber);text-shadow:0 0 18px var(--amber-glow);letter-spacing:-.01em}
  h1 .cursor{display:inline-block;width:.55ch;height:1em;background:var(--amber);margin-left:.1em;transform:translateY(.12em);animation:blink 1.05s steps(1) infinite;box-shadow:0 0 14px var(--amber-glow)}
  @keyframes blink{50%{opacity:0}}
  .sub{margin-top:12px;color:var(--muted);font-size:14px;line-height:1.6}
  .sub b{color:var(--text);font-weight:500}

  .container{display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start;margin-top:20px}
  @media(max-width:720px){.container{grid-template-columns:1fr}}

  .panel{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:20px}
  .label{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--amber-dim);margin-bottom:12px;display:block}

  /* Tabs */
  .tabs{display:flex;gap:0;background:var(--panel-2);border:1px solid var(--line);border-radius:8px;padding:4px;margin-bottom:16px}
  .tab{flex:1;font-family:inherit;font-size:12px;letter-spacing:.06em;padding:9px 8px;border-radius:5px;cursor:pointer;background:transparent;border:none;color:var(--muted);transition:all .15s;text-transform:uppercase}
  .tab:hover{color:var(--text)}
  .tab.active{background:var(--amber);color:#1a1304;font-weight:700;box-shadow:0 0 12px rgba(255,176,0,.25)}

  .tab-panel{display:none}
  .tab-panel.active{display:block}

  /* Inputs */
  textarea,input[type=text],input[type=tel],input[type=email],input[type=url],input[type=password]{
    width:100%;background:var(--panel-2);border:1px solid var(--line);border-radius:6px;padding:12px 14px;
    color:var(--text);font-family:'Gowun Dodum',sans-serif;font-size:14px;line-height:1.5;outline:none;caret-color:var(--amber);
    transition:border-color .15s, box-shadow .15s;
  }
  textarea{min-height:130px;resize:vertical;font-size:15px;line-height:1.7}
  textarea:focus,input:focus{border-color:var(--amber-dim);box-shadow:0 0 0 3px rgba(255,176,0,.08)}
  textarea::placeholder,input::placeholder{color:#5c5345}
  .form-stack > * + *{margin-top:10px}

  .ctrl{margin-top:16px}
  .ctrl > label, .ctrl-label{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--amber-dim);display:block;margin-bottom:8px}
  select{width:100%;background:var(--panel-2);border:1px solid var(--line);color:var(--text);font-family:inherit;font-size:13px;padding:10px 12px;border-radius:6px;outline:none;cursor:pointer}
  select:focus{border-color:var(--amber-dim)}
  select:disabled{opacity:.55;cursor:not-allowed}

  .checkbox{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text);cursor:pointer;padding:8px 0;font-family:'Gowun Dodum',sans-serif}
  .checkbox input{accent-color:var(--amber);width:16px;height:16px;cursor:pointer}

  .color-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .color-field{display:flex;align-items:center;gap:8px;background:var(--panel-2);border:1px solid var(--line);border-radius:6px;padding:6px 8px}
  .color-field input[type=color]{width:28px;height:28px;border:none;background:none;cursor:pointer;padding:0}
  .color-field span{font-size:11px;color:var(--muted)}

  /* Logo */
  .logo-row{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;background:var(--panel-2);border:1px solid var(--line);border-radius:6px;padding:10px 12px}
  .logo-row .file-btn{flex:1;font-family:inherit;font-size:12px;color:var(--text);background:transparent;border:1px dashed var(--line);border-radius:5px;padding:9px 12px;cursor:pointer;transition:border-color .15s;text-align:left}
  .logo-row .file-btn:hover{border-color:var(--amber-dim);color:var(--amber)}
  .logo-row .file-btn.has{border-style:solid;border-color:var(--amber-dim);color:var(--text)}
  .logo-row .file-btn .name{color:var(--amber);font-weight:600}
  .logo-row .remove{background:transparent;border:1px solid var(--line);color:var(--red);font-family:inherit;font-size:13px;padding:9px 12px;border-radius:5px;cursor:pointer}
  .logo-row .remove:hover{border-color:var(--red)}
  .logo-size{margin-top:10px;display:flex;align-items:center;gap:10px;font-size:11px;color:var(--muted)}
  .logo-size input[type=range]{flex:1;accent-color:var(--amber)}
  .logo-size .pct{color:var(--amber);font-weight:700;min-width:36px;text-align:right;font-variant-numeric:tabular-nums}

  .auto-h{margin-top:8px;font-size:11px;color:var(--amber-dim);display:flex;align-items:center;gap:6px}
  .auto-h.show{display:flex}
  .auto-h:not(.show){display:none}

  /* QR preview */
  .qr-container{display:flex;justify-content:center;align-items:center;background:#fff;border:1px solid var(--line);border-radius:10px;min-height:320px;padding:20px;position:relative}
  .qr-container.empty{background:var(--panel-2)}
  .qr-container.empty::after{content:"QR 코드 생성 대기";position:absolute;color:var(--muted);font-size:13px;opacity:.6}
  #qr svg{display:block;max-width:100%;height:auto}

  .btns{display:flex;gap:10px;margin-top:16px}
  .btn{flex:1;font-family:inherit;font-size:13px;letter-spacing:.04em;padding:12px 16px;border-radius:7px;cursor:pointer;transition:all .15s;border:1px solid var(--line);background:transparent;color:var(--text)}
  .btn:hover{border-color:var(--amber-dim);color:var(--amber)}
  .btn.down{background:var(--amber);color:#1a1304;border-color:var(--amber);font-weight:700}
  .btn.down:hover{box-shadow:0 0 22px var(--amber-glow)}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .btn:disabled:hover{box-shadow:none;border-color:var(--line);color:var(--text)}

  .info{font-size:12px;color:var(--muted);margin-top:14px;line-height:1.6}
  .info b{color:var(--text);font-weight:500}
  .fmt-note{display:flex;gap:14px;margin-top:10px;font-size:11px;color:var(--muted)}
  .fmt-note span b{color:var(--amber-dim)}

  .err{color:var(--red);font-size:12px;margin-top:8px}

  footer{margin-top:28px;padding-top:16px;border-top:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;color:var(--muted);font-size:12px;position:relative;z-index:1}
  footer a{color:var(--amber-dim);text-decoration:none;border-bottom:1px dotted var(--amber-dim)}
  footer a:hover{color:var(--amber)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <span class="badge">Text · URL · WiFi · vCard · Logo</span>
    <h1>QR 생성기<span class="cursor"></span></h1>
    <p class="sub">텍스트·URL은 물론 <b>WiFi 접속</b>, <b>vCard 명함</b>, <b>중앙 로고</b>까지 한 번에. <b>PNG</b>·<b>SVG</b> 다운로드.</p>
  </header>

  <div class="container">
    <div class="panel">
      <div class="tabs" role="tablist">
        <button class="tab active" data-mode="text">텍스트/URL</button>
        <button class="tab" data-mode="wifi">WiFi</button>
        <button class="tab" data-mode="vcard">vCard</button>
      </div>

      <!-- TEXT / URL -->
      <div class="tab-panel active" id="panel-text">
        <textarea id="input" placeholder="텍스트 또는 URL을 입력하세요…" spellcheck="false"></textarea>
      </div>

      <!-- WiFi -->
      <div class="tab-panel" id="panel-wifi">
        <div class="form-stack">
          <input type="text" id="wifi-ssid" placeholder="SSID — 네트워크 이름 *" autocomplete="off" spellcheck="false">
          <input type="text" id="wifi-pwd" placeholder="비밀번호" autocomplete="off" spellcheck="false">
          <select id="wifi-enc">
            <option value="WPA" selected>WPA / WPA2 / WPA3</option>
            <option value="WEP">WEP</option>
            <option value="nopass">암호 없음</option>
          </select>
          <label class="checkbox"><input type="checkbox" id="wifi-hidden"> 숨겨진 네트워크</label>
        </div>
      </div>

      <!-- vCard -->
      <div class="tab-panel" id="panel-vcard">
        <div class="form-stack">
          <input type="text" id="vc-name" placeholder="이름 *" autocomplete="off" spellcheck="false">
          <input type="tel" id="vc-tel" placeholder="전화번호" autocomplete="off">
          <input type="email" id="vc-email" placeholder="이메일" autocomplete="off">
          <input type="text" id="vc-org" placeholder="회사 / 조직" autocomplete="off">
          <input type="text" id="vc-title" placeholder="직책" autocomplete="off">
          <input type="url" id="vc-url" placeholder="웹사이트 URL" autocomplete="off">
        </div>
      </div>

      <div class="ctrl">
        <label>에러 정정</label>
        <select id="level">
          <option value="L">L (7% 복구)</option>
          <option value="M" selected>M (15% 복구)</option>
          <option value="Q">Q (25% 복구)</option>
          <option value="H">H (30% 복구)</option>
        </select>
        <div class="auto-h" id="auto-h">🔒 로고 사용 중 — 자동 H 레벨 (스캔 신뢰도 ↑)</div>
      </div>

      <div class="ctrl">
        <label>색상</label>
        <div class="color-row">
          <div class="color-field">
            <input type="color" id="fg" value="#000000">
            <span>전경</span>
          </div>
          <div class="color-field">
            <input type="color" id="bg" value="#ffffff">
            <span>배경</span>
          </div>
        </div>
      </div>

      <div class="ctrl">
        <label>로고 (선택)</label>
        <div class="logo-row">
          <label class="file-btn" id="logo-btn" for="logo-file">📷 이미지 선택 (PNG·JPG·SVG)</label>
          <input type="file" id="logo-file" accept="image/*" hidden>
          <button class="remove" id="logo-remove" hidden>제거</button>
        </div>
        <div class="logo-size" id="logo-size-row" hidden>
          <span>크기</span>
          <input type="range" id="logo-size" min="10" max="30" value="20" step="1">
          <span class="pct" id="logo-pct">20%</span>
        </div>
      </div>

      <div class="info" id="info-line">
        💡 <b>로고</b>를 넣으면 자동으로 H 레벨로 올라가고, 로고 뒤에 흰 패딩이 깔립니다.
      </div>
      <div class="err" id="err-line" hidden></div>
    </div>

    <div>
      <div class="qr-container empty" id="qr-container">
        <div id="qr"></div>
      </div>

      <div class="btns">
        <button class="btn down" id="dl-png" disabled>💾 PNG</button>
        <button class="btn down" id="dl-svg" disabled>💾 SVG</button>
      </div>

      <div class="fmt-note">
        <span><b>PNG</b> — 화면·앱·SNS용 이미지</span>
        <span><b>SVG</b> — 인쇄·확대용 벡터</span>
      </div>
    </div>
  </div>

  <footer>
    <span>CODINGNOW · QR Generator</span>
    <a href="#" id="donate">☕ 후원하기</a>
  </footer>
</div>

<script>
const $ = id => document.getElementById(id);
const DONATE_URL = "https://paypal.me/codingnow";

let qrData = null;
let currentMode = 'text';
let logoImage = null;     // HTMLImageElement (for canvas drawImage)
let logoDataURL = null;   // base64 dataURL (for SVG embed)
let logoName = '';

function levelMap(l){ return ({L:'L',M:'M',Q:'Q',H:'H'})[l] || 'M'; }

/* WiFi 문자열의 특수문자 이스케이프: \ ; , : " */
function wifiEscape(s){ return String(s).replace(/([\\;,:"])/g, '\\$1'); }

/* 현재 모드에 따른 QR 페이로드 */
function getPayload(){
  if(currentMode === 'text'){
    return $('input').value.trim();
  }
  if(currentMode === 'wifi'){
    const ssid = $('wifi-ssid').value;
    if(!ssid) return '';
    const enc = $('wifi-enc').value;        // WPA / WEP / nopass
    const pwd = $('wifi-pwd').value;
    const hidden = $('wifi-hidden').checked;
    let s = 'WIFI:T:' + enc + ';S:' + wifiEscape(ssid) + ';';
    if(enc !== 'nopass') s += 'P:' + wifiEscape(pwd) + ';';
    if(hidden) s += 'H:true;';
    s += ';';
    return s;
  }
  if(currentMode === 'vcard'){
    const fn = $('vc-name').value.trim();
    if(!fn) return '';
    const lines = ['BEGIN:VCARD','VERSION:3.0','FN:' + fn];
    const tel = $('vc-tel').value.trim();   if(tel)   lines.push('TEL:' + tel);
    const em  = $('vc-email').value.trim(); if(em)    lines.push('EMAIL:' + em);
    const org = $('vc-org').value.trim();   if(org)   lines.push('ORG:' + org);
    const ti  = $('vc-title').value.trim(); if(ti)    lines.push('TITLE:' + ti);
    const url = $('vc-url').value.trim();   if(url)   lines.push('URL:' + url);
    lines.push('END:VCARD');
    return lines.join('\n');
  }
  return '';
}

/* 로고 있으면 H로 강제 */
function effectiveLevel(){
  return logoImage ? 'H' : $('level').value;
}

function generate(){
  const payload = getPayload();
  const fg = $('fg').value, bg = $('bg').value;

  $('qr-container').classList.toggle('empty', !payload);
  $('dl-png').disabled = !payload;
  $('dl-svg').disabled = !payload;
  $('qr').innerHTML = '';
  setError('');

  // UI: 로고 자동-H 안내
  $('auto-h').classList.toggle('show', !!logoImage);
  $('level').disabled = !!logoImage;

  if(!payload){ qrData = null; return; }

  try{
    const qr = qrcode(0, levelMap(effectiveLevel()));
    qr.addData(payload);
    qr.make();
    qrData = qr;
    $('qr').innerHTML = buildSVG(qr, fg, bg, 320, true);
  }catch(e){
    qrData = null;
    setError('QR 생성 실패: ' + (e.message || '내용이 너무 깁니다 — 레벨을 낮추거나 글자 수를 줄이세요'));
  }
}

function setError(msg){
  const el = $('err-line');
  if(msg){ el.textContent = msg; el.hidden = false; } else { el.hidden = true; el.textContent = ''; }
}

/* QR 모듈 데이터 → SVG 문자열 (선택적 로고 포함) */
function buildSVG(qr, fg, bg, pxSize, withLogo){
  const count = qr.getModuleCount(), margin = 4, total = count + margin*2;
  let rects = '';
  for(let r=0;r<count;r++) for(let c=0;c<count;c++)
    if(qr.isDark(r,c)) rects += '<rect x="'+(c+margin)+'" y="'+(r+margin)+'" width="1" height="1"/>';

  let logoSvg = '';
  if(withLogo && logoImage && logoDataURL){
    const pct = (+$('logo-size').value) / 100;
    const lW = total * pct;
    const lX = (total - lW) / 2;
    const pad = total * 0.012;
    logoSvg =
      '<rect x="'+(lX-pad)+'" y="'+(lX-pad)+'" width="'+(lW+pad*2)+'" height="'+(lW+pad*2)+'" rx="'+(pad*0.8)+'" fill="#ffffff"/>' +
      '<image href="'+logoDataURL+'" x="'+lX+'" y="'+lX+'" width="'+lW+'" height="'+lW+'" preserveAspectRatio="xMidYMid meet"/>';
  }

  return '<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" '
       + 'width="'+pxSize+'" height="'+pxSize+'" viewBox="0 0 '+total+' '+total+'" shape-rendering="crispEdges">'
       + '<rect width="'+total+'" height="'+total+'" fill="'+bg+'"/>'
       + '<g fill="'+fg+'">'+rects+'</g>'
       + logoSvg
       + '</svg>';
}

/* QR 모듈 데이터 → 캔버스 (PNG용, 선택적 로고 포함) */
function buildCanvas(qr, fg, bg, cell, withLogo){
  const count = qr.getModuleCount(), margin = 4, total = count + margin*2;
  const canvas = document.createElement('canvas');
  canvas.width = canvas.height = total * cell;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = bg; ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = fg;
  for(let r=0;r<count;r++) for(let c=0;c<count;c++)
    if(qr.isDark(r,c)) ctx.fillRect((c+margin)*cell,(r+margin)*cell,cell,cell);

  if(withLogo && logoImage){
    const w = canvas.width;
    const pct = (+$('logo-size').value) / 100;
    const lW = w * pct;
    const lX = (w - lW) / 2;
    const pad = w * 0.012;
    ctx.fillStyle = '#ffffff';
    roundRect(ctx, lX-pad, lX-pad, lW+pad*2, lW+pad*2, pad*0.8);
    ctx.fill();
    // 비율 유지하며 중앙 정렬 (preserveAspectRatio xMidYMid meet 흉내)
    const iw = logoImage.naturalWidth || logoImage.width;
    const ih = logoImage.naturalHeight || logoImage.height;
    const scale = Math.min(lW/iw, lW/ih);
    const dw = iw*scale, dh = ih*scale;
    const dx = lX + (lW-dw)/2, dy = lX + (lW-dh)/2;
    ctx.drawImage(logoImage, dx, dy, dw, dh);
  }
  return canvas;
}

function roundRect(ctx, x, y, w, h, r){
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.arcTo(x+w, y,   x+w, y+h, r);
  ctx.arcTo(x+w, y+h, x,   y+h, r);
  ctx.arcTo(x,   y+h, x,   y,   r);
  ctx.arcTo(x,   y,   x+w, y,   r);
  ctx.closePath();
}

function downloadPNG(){
  if(!qrData) return;
  const canvas = buildCanvas(qrData, $('fg').value, $('bg').value, 16, true);
  const link = document.createElement('a');
  link.href = canvas.toDataURL('image/png');
  link.download = filenameFor('png');
  link.click();
}

function downloadSVG(){
  if(!qrData) return;
  const svg = buildSVG(qrData, $('fg').value, $('bg').value, 1024, true);
  const blob = new Blob([svg], {type:'image/svg+xml'});
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url; link.download = filenameFor('svg'); link.click();
  URL.revokeObjectURL(url);
}

function filenameFor(ext){
  const prefix = currentMode === 'wifi' ? 'qr-wifi' :
                 currentMode === 'vcard' ? 'qr-vcard' : 'qrcode';
  return prefix + '.' + ext;
}

/* 모드 탭 */
function switchMode(mode){
  currentMode = mode;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.mode === mode));
  ['text','wifi','vcard'].forEach(m => $('panel-'+m).classList.toggle('active', m === mode));
  generate();
}

/* 로고 파일 처리 */
async function handleLogoFile(file){
  if(!file){ removeLogo(); return; }
  try{
    const dataURL = await new Promise((res, rej) => {
      const r = new FileReader();
      r.onload = () => res(r.result);
      r.onerror = () => rej(new Error('파일 읽기 실패'));
      r.readAsDataURL(file);
    });
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.src = dataURL;
    await new Promise((res, rej) => { img.onload = res; img.onerror = () => rej(new Error('이미지 디코드 실패')); });
    logoImage = img;
    logoDataURL = dataURL;
    logoName = file.name;
    $('logo-btn').classList.add('has');
    $('logo-btn').innerHTML = '📷 <span class="name">' + escapeHtml(file.name) + '</span>';
    $('logo-remove').hidden = false;
    $('logo-size-row').hidden = false;
    generate();
  }catch(e){
    setError('로고 로드 실패: ' + e.message);
  }
}

function removeLogo(){
  logoImage = null; logoDataURL = null; logoName = '';
  $('logo-file').value = '';
  $('logo-btn').classList.remove('has');
  $('logo-btn').textContent = '📷 이미지 선택 (PNG·JPG·SVG)';
  $('logo-remove').hidden = true;
  $('logo-size-row').hidden = true;
  generate();
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* 이벤트 바인딩 */
document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => switchMode(t.dataset.mode)));

['input','wifi-ssid','wifi-pwd','wifi-hidden','wifi-enc',
 'vc-name','vc-tel','vc-email','vc-org','vc-title','vc-url']
  .forEach(id => {
    const el = $(id); if(!el) return;
    el.addEventListener('input', generate);
    el.addEventListener('change', generate);
  });

$('level').addEventListener('change', generate);
$('fg').addEventListener('input', generate);
$('bg').addEventListener('input', generate);
$('dl-png').addEventListener('click', downloadPNG);
$('dl-svg').addEventListener('click', downloadSVG);

$('logo-file').addEventListener('change', e => handleLogoFile(e.target.files[0]));
$('logo-remove').addEventListener('click', removeLogo);
$('logo-size').addEventListener('input', () => {
  $('logo-pct').textContent = $('logo-size').value + '%';
  generate();
});

if(DONATE_URL){ $('donate').href = DONATE_URL; }

generate();
</script>
