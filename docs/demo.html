<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>데모 — QR 코드 생성기 | CODINGNOW</title>
<meta name="description" content="QR 코드 생성기 자동 재생 데모 (25초)">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Gowun+Dodum&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>
<style>
  :root{
    --bg:#0b0a08; --panel:#141210; --panel-2:#1c1916;
    --amber:#ffb000; --amber-dim:#b8801f; --amber-glow:rgba(255,176,0,.35);
    --green:#5ddc7a; --red:#e0876a; --line:#2a251e; --muted:#7a6f5c; --text:#f3e7cf;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:radial-gradient(ellipse 120% 80% at 50% -10%, rgba(255,176,0,.06), transparent 60%), var(--bg);
    color:var(--text); font-family:'JetBrains Mono',monospace;
    min-height:100vh; display:flex; align-items:flex-start; justify-content:center;
    padding:clamp(16px,4vw,40px); position:relative; overflow-x:hidden;
  }
  body::after{content:"";position:fixed;inset:0;pointer-events:none;background:repeating-linear-gradient(to bottom,rgba(0,0,0,0) 0px,rgba(0,0,0,0) 2px,rgba(0,0,0,.18) 3px,rgba(0,0,0,0) 4px);mix-blend-mode:multiply;z-index:99}

  .wrap{width:100%;max-width:760px;position:relative;z-index:1}
  header{margin-bottom:24px}
  .badge{display:inline-block;font-size:11px;letter-spacing:.18em;color:var(--amber-dim);border:1px solid var(--line);padding:4px 10px;border-radius:2px;margin-bottom:14px;text-transform:uppercase}
  h1{font-size:clamp(24px,5.5vw,36px);font-weight:800;line-height:1.05;color:var(--amber);text-shadow:0 0 18px var(--amber-glow);letter-spacing:-.01em}
  h1 .cursor{display:inline-block;width:.55ch;height:1em;background:var(--amber);margin-left:.1em;transform:translateY(.12em);animation:blink 1.05s steps(1) infinite;box-shadow:0 0 14px var(--amber-glow)}
  @keyframes blink{50%{opacity:0}}
  .sub{margin-top:12px;color:var(--muted);font-size:14px;line-height:1.6}
  .sub b{color:var(--text);font-weight:500}

  .demo-bar{display:flex;align-items:center;gap:12px;padding:10px 14px;background:linear-gradient(90deg, rgba(255,176,0,.10), transparent);border:1px solid var(--amber-dim);border-radius:8px;margin-bottom:14px;font-size:12px;color:var(--text)}
  .demo-bar .dot{width:8px;height:8px;border-radius:50%;background:var(--red);box-shadow:0 0 10px var(--red);animation:rec 1s ease-in-out infinite}
  @keyframes rec{50%{opacity:.3}}
  .demo-bar .step{color:var(--amber);font-weight:700;letter-spacing:.04em;flex:1}
  .demo-bar .timer{color:var(--muted);font-variant-numeric:tabular-nums}
  .progress{position:absolute;left:0;right:0;bottom:-1px;height:2px;background:var(--line);border-radius:0 0 8px 8px;overflow:hidden}
  .progress > i{display:block;height:100%;background:var(--amber);box-shadow:0 0 8px var(--amber-glow);width:0%;transition:width .25s linear}

  .container{display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start;margin-top:20px}
  @media(max-width:660px){.container{grid-template-columns:1fr}}

  .panel{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:20px;transition:border-color .25s, box-shadow .25s}
  .panel.spot{border-color:var(--amber-dim);box-shadow:0 0 0 3px rgba(255,176,0,.08)}
  .label{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--amber-dim);margin-bottom:12px;display:block}

  textarea{width:100%;min-height:130px;resize:vertical;background:var(--panel-2);border:1px solid var(--line);border-radius:6px;padding:14px;color:var(--text);font-family:'Gowun Dodum',sans-serif;font-size:15px;line-height:1.7;outline:none;caret-color:var(--amber);transition:border-color .2s, box-shadow .2s}
  textarea.spot{border-color:var(--amber-dim);box-shadow:0 0 0 3px rgba(255,176,0,.12)}

  .ctrl{margin-top:16px}
  .ctrl label{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--amber-dim);display:block;margin-bottom:8px}
  select{width:100%;background:var(--panel-2);border:1px solid var(--line);color:var(--text);font-family:inherit;font-size:13px;padding:10px 12px;border-radius:6px;outline:none;cursor:pointer;transition:border-color .2s, box-shadow .2s}
  select.spot{border-color:var(--amber-dim);box-shadow:0 0 0 3px rgba(255,176,0,.12)}

  .color-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .color-field{display:flex;align-items:center;gap:8px;background:var(--panel-2);border:1px solid var(--line);border-radius:6px;padding:6px 8px;transition:border-color .2s, box-shadow .2s}
  .color-field.spot{border-color:var(--amber-dim);box-shadow:0 0 0 3px rgba(255,176,0,.12)}
  .color-field input[type=color]{width:28px;height:28px;border:none;background:none;cursor:pointer;padding:0}
  .color-field span{font-size:11px;color:var(--muted)}

  .qr-container{display:flex;justify-content:center;align-items:center;background:#fff;border:1px solid var(--line);border-radius:10px;min-height:300px;padding:20px;position:relative;transition:transform .3s}
  .qr-container.empty{background:var(--panel-2)}
  .qr-container.empty::after{content:"QR 코드 생성 대기";position:absolute;color:var(--muted);font-size:13px;opacity:.6}
  .qr-container.pulse{transform:scale(1.02)}
  #qr svg{display:block;max-width:100%;height:auto}

  .btns{display:flex;gap:10px;margin-top:16px}
  .btn{flex:1;font-family:inherit;font-size:13px;letter-spacing:.04em;padding:12px 16px;border-radius:7px;cursor:pointer;transition:all .15s;border:1px solid var(--line);background:transparent;color:var(--text);position:relative}
  .btn.down{background:var(--amber);color:#1a1304;border-color:var(--amber);font-weight:700}
  .btn.down:hover, .btn.down.spot{box-shadow:0 0 22px var(--amber-glow);transform:translateY(-1px)}
  .btn:disabled{opacity:.4;cursor:not-allowed}

  .fmt-note{display:flex;gap:14px;margin-top:10px;font-size:11px;color:var(--muted)}
  .fmt-note span b{color:var(--amber-dim)}

  footer{margin-top:28px;padding-top:16px;border-top:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;color:var(--muted);font-size:12px;position:relative;z-index:1}
  footer a{color:var(--amber-dim);text-decoration:none;border-bottom:1px dotted var(--amber-dim)}

  .demo-bar{position:relative}

  .replay{position:fixed;right:18px;bottom:18px;z-index:200;background:var(--panel);color:var(--text);border:1px solid var(--amber-dim);border-radius:999px;padding:10px 16px;font-family:inherit;font-size:12px;letter-spacing:.04em;cursor:pointer;box-shadow:0 6px 20px rgba(0,0,0,.4)}
  .replay:hover{color:var(--amber);box-shadow:0 0 18px var(--amber-glow)}

  .subtitle{position:fixed;left:50%;bottom:80px;transform:translateX(-50%);z-index:150;max-width:min(680px, 92vw);background:rgba(11,10,8,.86);backdrop-filter:blur(8px);border:1px solid var(--line);border-radius:10px;padding:14px 22px;font-family:'Gowun Dodum',sans-serif;font-size:17px;line-height:1.5;color:var(--text);text-align:center;opacity:0;transition:opacity .35s ease;pointer-events:none;box-shadow:0 10px 30px rgba(0,0,0,.5)}
  .subtitle.show{opacity:1}
  .subtitle::before{content:"";position:absolute;left:14px;top:50%;width:3px;height:60%;background:var(--amber);border-radius:2px;transform:translateY(-50%);box-shadow:0 0 8px var(--amber-glow)}
  @media(max-width:660px){.subtitle{font-size:14px;padding:10px 16px;bottom:70px}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <span class="badge">Demo &middot; Auto-play</span>
    <h1>QR 생성기 데모<span class="cursor"></span></h1>
    <p class="sub">실제 도구가 어떻게 동작하는지 25초간 자동 시연합니다. <a href="../index.html" style="color:var(--amber-dim);border-bottom:1px dotted var(--amber-dim);text-decoration:none">→ 실제 도구 열기</a></p>
  </header>

  <div class="demo-bar">
    <span class="dot"></span>
    <span class="step" id="step-label">시작 중…</span>
    <span class="timer" id="step-timer">0.0s</span>
    <span class="progress"><i id="progress-bar"></i></span>
  </div>

  <div class="container">
    <div class="panel" id="panel-input">
      <label class="label">텍스트 / URL</label>
      <textarea id="input" placeholder="여기에 입력하세요…" spellcheck="false" readonly></textarea>

      <div class="ctrl">
        <label>에러 정정</label>
        <select id="level">
          <option value="L">L (7% 복구)</option>
          <option value="M" selected>M (15% 복구)</option>
          <option value="Q">Q (25% 복구)</option>
          <option value="H">H (30% 복구)</option>
        </select>
      </div>

      <div class="ctrl">
        <label>색상</label>
        <div class="color-row">
          <div class="color-field" id="fg-field">
            <input type="color" id="fg" value="#000000">
            <span>전경</span>
          </div>
          <div class="color-field" id="bg-field">
            <input type="color" id="bg" value="#ffffff">
            <span>배경</span>
          </div>
        </div>
      </div>
    </div>

    <div>
      <div class="qr-container empty" id="qr-container">
        <div id="qr"></div>
      </div>

      <div class="btns">
        <button class="btn down" id="dl-png" disabled>💾 PNG</button>
        <button class="btn down" id="dl-svg" disabled>💾 SVG</button>
      </div>

      <div class="fmt-note">
        <span><b>PNG</b> — 화면·앱·SNS용 이미지</span>
        <span><b>SVG</b> — 인쇄·확대용 벡터</span>
      </div>
    </div>
  </div>

  <footer>
    <span>CODINGNOW · QR Generator Demo</span>
    <a href="https://paypal.me/codingnow">☕ 후원하기</a>
  </footer>
</div>

<div class="subtitle" id="subtitle" aria-live="polite"></div>
<button class="replay" id="replay">↻ 다시 재생</button>

<script>
const $ = id => document.getElementById(id);

let qrData = null;
function levelMap(l){ return ({L:'L',M:'M',Q:'Q',H:'H'})[l] || 'M'; }

function generate(){
  const text = $('input').value.trim();
  const level = $('level').value;
  const fg = $('fg').value, bg = $('bg').value;

  $('qr-container').classList.toggle('empty', !text);
  $('dl-png').disabled = !text;
  $('dl-svg').disabled = !text;
  $('qr').innerHTML = '';

  if(!text){ qrData = null; return; }
  try{
    const qr = qrcode(0, levelMap(level));
    qr.addData(text); qr.make();
    qrData = qr;
    $('qr').innerHTML = buildSVG(qr, fg, bg, 320);
  }catch(e){
    $('qr').innerHTML = '<span style="color:#e0876a;font-size:13px">오류: '+(e.message||'입력이 너무 깁니다')+'</span>';
    qrData = null;
  }
}
function buildSVG(qr, fg, bg, pxSize){
  const count = qr.getModuleCount(), margin = 4, total = count + margin*2;
  let rects = '';
  for(let r=0;r<count;r++) for(let c=0;c<count;c++)
    if(qr.isDark(r,c)) rects += '<rect x="'+(c+margin)+'" y="'+(r+margin)+'" width="1" height="1"/>';
  return '<svg xmlns="http://www.w3.org/2000/svg" width="'+pxSize+'" height="'+pxSize+'" viewBox="0 0 '+total+' '+total+'" shape-rendering="crispEdges">'
       + '<rect width="'+total+'" height="'+total+'" fill="'+bg+'"/>'
       + '<g fill="'+fg+'">'+rects+'</g></svg>';
}

/* --- Demo automation --- */
const sleep = ms => new Promise(r=>setTimeout(r,ms));
let demoAbort = false;

async function typeText(el, text, perChar=120){
  el.value = '';
  for(const ch of text){
    if(demoAbort) return;
    el.value += ch;
    generate();
    await sleep(perChar);
  }
}

function spot(el, on=true){
  if(!el) return;
  el.classList.toggle('spot', on);
}

function setStep(label, caption){
  $('step-label').textContent = label;
  if(caption !== undefined) setCaption(caption);
}
let captionToken = 0;
function setCaption(text){
  const el = $('subtitle');
  const token = ++captionToken;
  el.classList.remove('show');
  setTimeout(()=>{
    if(token !== captionToken) return;
    if(!text){ el.textContent = ''; return; }
    el.textContent = text;
    el.classList.add('show');
  }, 180);
}

const TOTAL_MS = 25000;
let startedAt = 0;
let progressDone = false;
function tickProgress(){
  if(demoAbort || progressDone) return;
  const elapsed = performance.now() - startedAt;
  const pct = Math.min(100, (elapsed/TOTAL_MS)*100);
  $('progress-bar').style.width = pct + '%';
  $('step-timer').textContent = (elapsed/1000).toFixed(1) + 's';
  if(pct < 100) requestAnimationFrame(tickProgress);
}

async function runDemo(){
  demoAbort = false;
  progressDone = false;
  startedAt = performance.now();
  $('progress-bar').style.width = '0%';
  requestAnimationFrame(tickProgress);

  setStep('① 텍스트 / URL 입력', '텍스트나 URL을 입력하면 실시간으로 QR이 생성됩니다');
  spot($('input'), true);
  await typeText($('input'), 'https://codingnow.com', 130);
  await sleep(1200);
  spot($('input'), false);

  setStep('② 한글·이모지 OK', '한글·이모지도 UTF-8 그대로 인코딩됩니다');
  spot($('input'), true);
  await typeText($('input'), '안녕! QR 만들기 🚀', 140);
  await sleep(1300);
  spot($('input'), false);

  setStep('③ 에러 정정 레벨 변경 (M → H)', '에러 정정 레벨을 높이면 손상돼도 더 잘 읽혀요');
  spot($('level'), true);
  await sleep(700);
  $('level').value = 'H'; generate();
  $('qr-container').classList.add('pulse'); await sleep(400);
  $('qr-container').classList.remove('pulse');
  await sleep(2100);
  spot($('level'), false);

  setStep('④ 색상 커스터마이즈', '전경·배경 색상을 자유롭게 — 단, 대비는 유지하세요');
  spot($('fg-field'), true);
  await sleep(600);
  $('fg').value = '#b8801f'; generate();
  await sleep(1100);
  spot($('fg-field'), false);
  spot($('bg-field'), true);
  await sleep(600);
  $('bg').value = '#fff8e1'; generate();
  await sleep(1300);
  spot($('bg-field'), false);

  setStep('⑤ PNG 다운로드 (고해상도 래스터)', 'PNG로 다운로드 — 화면·앱·SNS용 고해상도 이미지');
  spot($('dl-png'), true);
  await sleep(2700);
  spot($('dl-png'), false);

  setStep('⑥ SVG 다운로드 (확대해도 안 깨짐)', 'SVG로 다운로드 — 인쇄·확대해도 깨지지 않는 벡터');
  spot($('dl-svg'), true);
  await sleep(2700);
  spot($('dl-svg'), false);

  setStep('✓ 끝 — index.html 한 파일로 동작', '단일 HTML 파일로 끝. 서버도, 설치도 없습니다');
  $('level').value = 'M';
  $('fg').value = '#000000';
  $('bg').value = '#ffffff';
  generate();
  await sleep(1800);
  progressDone = true;
  $('progress-bar').style.width = '100%';
}

$('replay').addEventListener('click', async () => {
  demoAbort = true;
  await sleep(50);
  $('input').value = '';
  $('level').value = 'M';
  $('fg').value = '#000000';
  $('bg').value = '#ffffff';
  generate();
  await sleep(150);
  runDemo();
});

// kick off
generate();
runDemo();
</script>
</body>
</html>
